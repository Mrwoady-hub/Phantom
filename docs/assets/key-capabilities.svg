    <text x="874" y="151" fill="#94A3B8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">Keychain-backed HMAC audit trails and</text>
    <text x="874" y="169" fill="#94A3B8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">MITRE ATT&amp;CK-mapped findings by design.</text>
