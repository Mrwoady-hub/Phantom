<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1020"/>
      <stop offset="1" stop-color="#171B2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7C4DFF"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="220" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="172" rx="18" fill="#0F1324" stroke="#2B3353"/>
  <text x="48" y="63" fill="#F8FAFC" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="700">Key Capabilities</text>

  <g>
    <rect x="48" y="86" width="250" height="86" rx="16" fill="#151A2E" stroke="#2E375A"/>
    <circle cx="79" cy="117" r="11" fill="#2DD4BF"/>
    <text x="103" y="123" fill="#E2E8F0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700">Process Monitoring</text>
    <text x="64" y="151" fill="#94A3B8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">Detects masquerading, scripting abuse,</text>
    <text x="64" y="169" fill="#94A3B8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">credential dumping, and process injection.</text>
  </g>

  <g>
    <rect x="318" y="86" width="250" height="86" rx="16" fill="#151A2E" stroke="#2E375A"/>
    <circle cx="349" cy="117" r="11" fill="#60A5FA"/>
    <text x="373" y="123" fill="#E2E8F0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700">Network Visibility</text>
    <text x="334" y="151" fill="#94A3B8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">Tracks external connections, DNS-style</text>
    <text x="334" y="169" fill="#94A3B8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">signals, and threat-intel correlations.</text>
  </g>

  <g>
    <rect x="588" y="86" width="250" height="86" rx="16" fill="#151A2E" stroke="#2E375A"/>
    <circle cx="619" cy="117" r="11" fill="#F59E0B"/>
    <text x="643" y="123" fill="#E2E8F0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700">Persistence Scanning</text>
    <text x="604" y="151" fill="#94A3B8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">Surfaces LaunchAgents, Login Items,</text>
    <text x="604" y="169" fill="#94A3B8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">cron entries, symlinks, and weak paths.</text>
